name: 💡 Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Please explain clearly what you’d like to see improved or added.

  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: e.g. "Add a signal when a transition fails"

  - type: textarea
    id: motivation
    attributes:
      label: Why is this feature needed?
      description: What problem would this solve for you or other users?

  - type: textarea
    id: details
    attributes:
      label: Proposed solution
      description: Describe how you imagine this feature working (API, settings, etc.)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried something else? Any existing workaround?
