{% extends "base.html" %}

{% block centered_container %}

<h1 class="mb-4">Login</h1>
<div class="row">


    <div class="shadow-sm p-3 px-5 mb-4 col-lg-6 justify-content-center bg-white">
        <h4 class="mb-1">Username and password</h4>
        <form class="pr-5" method="post" action="{% url 'login' %}">
            <p></p>
            {% csrf_token %}
            <div class="form-group">
                <label for="{{form.username.auto_id}}">
                    {{form.username.label}}
                </label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="{{form.password.auto_id}}">
                    {{form.password.label}}
                </label>
            {{ form.password }}
            </div>
            <input id="submit-btn" class="btn btn-primary" type="submit" value='Login'>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>

{% endblock %}
